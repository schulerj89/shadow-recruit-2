interface:
  display_name: "Shadow Recruit Game Tester"
  short_description: "Fuses screenshots, coordinates, probes, and density"
  default_prompt: "Use $shadow-recruit-game-tester to play Shadow Recruit 2 with npm run tester:play, then review screenshots, smoke results, FPS metrics, playthrough artifacts, sentry failure/retry evidence, wall-run interval ledgers, wall-line connection graphs, door-to-door coordinate gaps, camera-probe first-hit rows, title hero facing/projection/identity-anchor evidence, asset/texture grades, and AAA active-camera density scorecards."
