interface:
  display_name: "Shadow Recruit Game Tester"
  short_description: "Fuses screenshots, coordinates, probes, and density"
  default_prompt: "Use $shadow-recruit-game-tester to play Shadow Recruit 2 with npm run tester:play, then review screenshots, smoke results, FPS metrics, playthrough artifacts, sentry failure/retry evidence, screenshot-to-wall-line lookups, inter-door owner spans, wall-run interval ledgers, wall-line connection graphs, camera-probe first-hit rows, title hero facing/projection/identity-anchor evidence, asset/texture grades, and near/mid/far AAA active-camera density scorecards."
